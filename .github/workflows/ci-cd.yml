# ══════════════════════════════════════════════════════════════════════════════
# Expense Tracker — CI/CD Pipeline (GitHub Actions)
#
# Triggers:
#   • Push to main  → full pipeline (test → build → push → infra → deploy)
#   • Pull Request  → test + build only (no push/deploy)
#   • Manual        → workflow_dispatch with optional destroy flag
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID          - Service Principal / Federated credential client id
#   AZURE_TENANT_ID          - Azure Tenant ID
#   AZURE_SUBSCRIPTION_ID    - Azure Subscription ID
#   ACR_LOGIN_SERVER         - e.g. expensetrackerprodacr.azurecr.io
#   AKS_CLUSTER_NAME         - AKS cluster name
#   AKS_RESOURCE_GROUP       - Resource group name
#   MONGO_URI                - MongoDB Atlas connection string
#   JWT_SECRET               - JWT signing secret
#   VITE_API_URL             - Public URL of backend API
# ══════════════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      destroy_infra:
        description: "Destroy infrastructure? (type 'yes' to confirm)"
        required: false
        default: "no"

permissions:
  contents: read
  id-token: write   # Required for OIDC / Workload Identity Federation

env:
  IMAGE_TAG: ${{ github.sha }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════
  # JOB 1 — Test Backend
  # ══════════════════════════════
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  # ══════════════════════════════
  # JOB 2 — Test Frontend
  # ══════════════════════════════
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (validates compilation)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

  # ══════════════════════════════
  # JOB 3 — Build & Push Docker Images
  # ══════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ──────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ─────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════
  # JOB 4 — Terraform (Infrastructure)
  # ══════════════════════════════
  terraform:
    name: 🏗️ Terraform
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8"

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

      - name: Terraform Apply
        if: github.event.inputs.destroy_infra != 'yes'
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

      - name: Terraform Destroy (manual trigger only)
        if: github.event.inputs.destroy_infra == 'yes'
        run: terraform destroy -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

  # ══════════════════════════════
  # JOB 5 — Deploy to AKS
  # ══════════════════════════════
  deploy:
    name: 🚀 Deploy to AKS
    runs-on: ubuntu-latest
    needs: [terraform]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Create/update Kubernetes secrets
        run: |
          kubectl create secret generic expense-secrets \
            --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --namespace expense-tracker \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Patch image tags in K8s manifests
        run: |
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          TAG="${{ env.IMAGE_TAG }}"

          # Patch backend deployment image
          sed -i "s|REGISTRY_PLACEHOLDER/expense-backend:IMAGE_TAG|${REGISTRY}/expense-backend:${TAG}|g" \
            k8s/base/backend-deployment.yaml

          # Patch frontend deployment image
          sed -i "s|REGISTRY_PLACEHOLDER/expense-frontend:IMAGE_TAG|${REGISTRY}/expense-frontend:${TAG}|g" \
            k8s/base/frontend-deployment.yaml

      - name: Apply Kubernetes manifests (Kustomize)
        run: kubectl apply -k k8s/overlays/production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n expense-tracker --timeout=120s
          kubectl rollout status deployment/frontend -n expense-tracker --timeout=120s

      - name: Print service info
        run: |
          echo "=== Pods ==="
          kubectl get pods -n expense-tracker
          echo "=== Services ==="
          kubectl get svc -n expense-tracker
          echo "=== Ingress ==="
          kubectl get ingress -n expense-tracker
